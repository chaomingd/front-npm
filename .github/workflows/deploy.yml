name: Deploy Dumi to GitHub Pages

on:
  push:
    branches:
      - main # 触发部署的分支，根据需要修改

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: 使用 Nnode.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install

      - name: Build project
        run: pnpm docs:build

      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # 将构建结果推送到 gh-pages 分支
          folder: docs-dist # 从 docs-dist 文件夹上传文件
          # 注意：GITHUB_TOKEN 是 GitHub 自动生成的，无需手动配置
          token:  $ {{ secrets.GITHUB_TOKEN }}
